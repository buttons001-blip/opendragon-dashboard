<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Vue</title>
<script src="./js/vue.min.js"></script>
</head>
<body>
<div id="app">
<h1>{{ msg }}</h1>
<p>Vue 版本：{{ version }}</p>
</div>
<script>
const { createApp } = Vue;
createApp({
data() {
return {
msg: 'Hello World!',
version: Vue.version
}
}
}).mount('#app');
console.log('Vue started!');
</script>
</body>
</html>
