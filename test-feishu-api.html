<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书 API 测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; }
        button { background: #007bff; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background: #0056b3; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 飞书多维表格 API 测试</h1>
        
        <div class="test-section">
            <h2>测试 1: 读取持仓记录</h2>
            <button onclick="testPositions()">测试读取飞书数据</button>
            <div id="result1"></div>
        </div>
        
        <div class="test-section">
            <h2>测试 2: 读取指数数据</h2>
            <button onclick="testIndices()">测试读取指数数据</button>
            <div id="result2"></div>
        </div>
        
        <div class="test-section">
            <h2>测试 3: 本地 JSON 对比</h2>
            <button onclick="testLocalJSON()">读取本地 JSON</button>
            <div id="result3"></div>
        </div>
    </div>
    
    <script>
        // 飞书多维表格配置
        const FEISHU_CONFIG = {
            appToken: 'R9u7b3UTeagvfrsQEiGcgG7snBc',
            tableId: 'tblYYndqV1vTDg8I',
            // 注意：实际使用时需要通过后端代理，不能在前端暴露 App Secret
            // 这里仅做演示，实际调用需要通过 OpenClaw 后端
        };
        
        // 测试 1: 读取飞书持仓数据
        async function testPositions() {
            const resultDiv = document.getElementById('result1');
            resultDiv.innerHTML = '<div class="info">正在请求飞书 API...</div>';
            
            try {
                // 通过 OpenClaw 后端代理调用飞书 API
                const response = await fetch('/api/feishu/bitable/records?app_token=' + FEISHU_CONFIG.appToken + '&table_id=' + FEISHU_CONFIG.tableId);
                
                if (!response.ok) {
                    throw new Error('API 调用失败：' + response.status);
                }
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="success">✅ 成功读取飞书数据！</div>
                    <h3>记录数量：${data.records?.length || 0}</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">❌ 失败：${error.message}</div>
                    <p>注意：飞书 API 需要通过后端代理调用，不能直接从前端访问。</p>
                    <p>需要配置 OpenClaw 后端代理或使用 serverless 函数。</p>
                `;
            }
        }
        
        // 测试 2: 读取指数数据
        async function testIndices() {
            const resultDiv = document.getElementById('result2');
            resultDiv.innerHTML = '<div class="info">正在读取本地 indices.json...</div>';
            
            try {
                const response = await fetch('data/indices.json?t=' + Date.now());
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="success">✅ 成功读取指数数据！</div>
                    <h3>市场数量：${Object.keys(data).length}</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">❌ 失败：${error.message}</div>
                `;
            }
        }
        
        // 测试 3: 读取本地 JSON
        async function testLocalJSON() {
            const resultDiv = document.getElementById('result3');
            resultDiv.innerHTML = '<div class="info">正在读取本地 positions.json...</div>';
            
            try {
                const response = await fetch('data/positions.json?t=' + Date.now());
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="success">✅ 成功读取本地数据！</div>
                    <h3>持仓数量：${data.positions?.length || 0}</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">❌ 失败：${error.message}</div>
                `;
            }
        }
        
        // 页面加载时自动显示说明
        window.onload = function() {
            console.log('飞书 API 测试页面已加载');
            console.log('配置:', FEISHU_CONFIG);
        };
    </script>
</body>
</html>
