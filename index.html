<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐉 OpenDragon 炒股看板</title>
    <script src="./js/vue.min.js"></script>
    <script src="./js/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', 'Source Han Sans SC', 'Noto Sans CJK SC', sans-serif !important;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 8px;
        }
        .container { max-width: 750px; margin: 0 auto; }
        
        /* 交易状态 */
        .status-bar {
            text-align: center;
            padding: 8px;
            background: linear-gradient(135deg, #1a5c1a 0%, #0d3b0d 100%);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .status-text { color: #0f0; font-size: 1.2em; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,0,0.5); }
        
        /* 卡片 */
        .card { background: #fff; border-radius: 6px; padding: 10px; margin-bottom: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        .card-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 6px; border-bottom: 1px solid #eee; margin-bottom: 8px; }
        .card-title { font-size: 0.9em; font-weight: bold; color: #333; }
        
        /* 标题 */
        .title-section { text-align: center; padding: 8px; margin-bottom: 8px; }
        .title-section h1 { color: #333; font-size: 1.1em; }
        .title-section .time { color: #666; font-size: 0.8em; margin-top: 3px; }
        
        /* 上半部分：股市守则 + 总投资 并排 */
        .top-row {
            display: flex;
            flex-direction: row;
            gap: 8px;
            margin-bottom: 8px;
        }
        .top-row > .card {
            flex: 1;
            min-width: 0;
        }
        
        /* 股市守则 - 2 列 */
        .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .rules-list { list-style: none; }
        .rules-list li { padding: 3px 0; color: #555; font-size: 0.72em; line-height: 1.3; }
        .rules-list li:before { content: '✓ '; color: #0a0; font-weight: bold; }
        
        /* 总投资 */
        .capital-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .capital-gauge { width: 130px; height: 80px; }
        .capital-info { width: 100%; font-size: 0.72em; }
        .capital-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .capital-label { color: #888; }
        .capital-value { font-weight: bold; }
        .profit-up { color: #d00; }
        .profit-down { color: #0a0; }
        
        /* 个股 */
        .stocks-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .stock-item { text-align: center; }
        .stock-gauge { width: 115px; height: 70px; }
        .stock-info { font-size: 0.65em; margin-top: 5px; }
        .stock-code { color: #999; }
        .stock-name { 
            font-weight: bold; 
            color: #333; 
            margin: 2
