<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OpenDragon Redirect</title>
    <script>
        // 基于域名的重定向
        const hostname = window.location.hostname;
        
        if (hostname === 'www.opendragon.icu' || hostname === 'opendragon.icu') {
            // 主站点
            window.location.href = '/test/index/index.html';
        } else if (hostname === 'stock.opendragon.icu') {
            // 股票站点 - 默认重定向到 A股
            if (window.location.pathname === '/' || window.location.pathname === '') {
                window.location.href = '/stock';
            }
        } else if (hostname === 'cigars.opendragon.icu') {
            // 雪茄站点
            window.location.href = '/test/cigars/';
        } else if (hostname === 'openclaw.opendragon.icu') {
            // OpenClaw 站点
            window.location.href = '/test/openclaw-dashboard/';
        } else {
            // 默认主站点
            window.location.href = '/test/index/index.html';
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
