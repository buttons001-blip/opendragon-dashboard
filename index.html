<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐉 OpenDragon 股票仪表盘</title>
    <script src="./js/vue.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #e94560; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .card h2 { color: #e94560; margin-bottom: 15px; font-size: 1.2em; }
        .item { background: rgba(233,69,96,0.1); border-left: 3px solid #e94560; padding: 10px; margin-bottom: 10px; border-radius: 0 5px 5px 0; }
        .item .no { color: #e94560; font-weight: bold; font-size: 0.85em; }
        .item .title { font-weight: bold; margin: 5px 0; }
        .item .core { color: #aaa; font-size: 0.85em; }
        .item .app { color: #4ecdc4; font-size: 0.85em; font-style: italic; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85em; }
        th { color: #e94560; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; text-align: center; }
        .stat .label { color: #888; font-size: 0.8em; margin-bottom: 5px; }
        .stat .value { font-size: 1.2em; font-weight: bold; color: #e94560; }
        .time { color: #0f0; font-size: 0.85em; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <h1>🐉 OpenDragon 股票仪表盘</h1>
            <p class="subtitle">A 股模拟交易系统</p>
            <p class="time">更新时间：{{ time }}</p>
            
            <div class="grid">
                <div class="card">
                    <h2>📜 十大原则</h2>
                    <div class="item" v-for="p in principles" :key="p.id">
                        <div class="no">原则 {{ p.no }}</div>
                        <div class="title">{{ p.title }}</div>
                        <div class="core">💡 {{ p.core }}</div>
                        <div class="app">🎯 {{ p.app }}</div>
                    </div>
                </div>
                
                <div class="card">
                    <h2>📊 持仓</h2>
                    <table>
                        <tr><th>代码</th><th>名称</th><th>价格</th><th>数量</th></tr>
                        <tr v-for="s in stocks" :key="s.code">
                            <td>{{ s.code }}</td>
                            <td>{{ s.name }}</td>
                            <td>¥{{ s.price }}</td>
                            <td>{{ s.qty }}</td>
                        </tr>
                    </table>
                </div>
                
                <div class="card">
                    <h2>💰 资金</h2>
                    <div class="stats">
                        <div class="stat"><div class="label">初始</div><div class="value">100 万</div></div>
                        <div class="stat"><div class="label">已用</div><div class="value">32.5 万</div></div>
                        <div class="stat"><div class="label">可用</div><div class="value" style="color:#4ecdc4">67.5 万</div></div>
                        <div class="stat"><div class="label">仓位</div><div class="value">32.5%</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        Vue.createApp({
            data() {
                return {
                    time: new Date().toLocaleString(),
                    principles: [
                        {id:1,no:1,title:"市场永远正确",core:"顺应最小阻力方向",app:"不与大盘作对"},
                        {id:2,no:2,title:"耐心等待关键点",core:"突破关键位再行动",app:"等待突破均线"},
                        {id:3,no:3,title:"截断亏损让利润奔跑",core:"亏损立即了结",app:"设止损点 -5%"},
                        {id:4,no:4,title:"金字塔加仓",core:"只有盈利才加仓",app:"底仓 30% 盈利后加"},
                        {id:5,no:5,title:"锁定利润",core:"提取现金",app:"盈利 20% 提 10%"},
                        {id:6,no:6,title:"追随领头羊",core:"专注龙头股",app:"跟踪板块龙头"},
                        {id:7,no:7,title:"不向下摊平",core:"亏损不加仓",app:"触发止损离场"},
                        {id:8,no:8,title:"内幕消息是毒药",core:"相信自己判断",app:"不看小道消息"},
                        {id:9,no:9,title:"投机是事业",core:"详细记录分析",app:"建立交易日志"},
                        {id:10,no:10,title:"最大敌人是自己",core:"克服贪婪恐惧",app:"严格执行计划"}
                    ],
                    stocks: [
                        {code:"688297",name:"中无人机",price:55.77,qty:1400},
                        {code:"300750",name:"宁德时代",price:404.90,qty:200},
                        {code:"603986",name:"兆易创新",price:285.80,qty:300},
                        {code:"002594",name:"比亚迪",price:102.46,qty:500},
                        {code:"002389",name:"航天彩虹",price:24.43,qty:1200}
                    ]
                }
            },
            mounted() {
                console.log('✅ 仪表盘启动成功');
                setInterval(() => { this.time = new Date().toLocaleString(); }, 60000);
            }
        }).mount('#app');
    </script>
</body>
</html>
