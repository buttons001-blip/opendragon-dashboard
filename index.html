<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Monitor - 亨利大管家</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222e;
            --border: #2a2a3a;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --accent: #00d4ff;
            --accent-hover: #00b8e6;
            --success: #00e676;
            --warning: #ffab00;
            --error: #ff5252;
            --info: #448aff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(0, 230, 118, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .status-badge.offline {
            background: rgba(255, 82, 82, 0.15);
            color: var(--error);
        }

        .status-badge.offline::before {
            background: var(--error);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        #countdown {
            font-weight: 700;
            color: var(--accent);
            min-width: 28px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-danger {
            background: rgba(255, 82, 82, 0.15);
            color: var(--error);
            border: 1px solid rgba(255, 82, 82, 0.3);
        }

        .btn-danger:hover {
            background: rgba(255, 82, 82, 0.25);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Status Cards */
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* Service Status */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .service-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .service-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .service-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .service-status.online {
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
        }

        .service-status.offline {
            background: rgba(255, 82, 82, 0.15);
            color: var(--error);
        }

        .service-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .service-latency {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
            font-variant-numeric: tabular-nums;
        }

        /* Agent Config */
        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .agent-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--success));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .agent-info {
            flex: 1;
        }

        .agent-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .agent-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Quick Links */
        .quick-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .quick-link {
            flex: 1;
            min-width: 100px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .quick-link:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            text-decoration: none;
        }

        .quick-link-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .quick-link-label {
            font-size: 13px;
            font-weight: 600;
        }

        /* Tasks */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-name {
            font-size: 14px;
            font-weight: 500;
        }

        .task-schedule {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .task-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .task-badge.active {
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
        }

        .task-badge.paused {
            background: rgba(255, 171, 0, 0.15);
            color: var(--warning);
        }

        .rest-day-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 8px;
            background: rgba(136, 136, 160, 0.15);
            color: var(--text-secondary);
        }

        /* Skills */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .skill-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .skill-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .skill-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(0, 212, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .skill-name {
            font-size: 13px;
            font-weight: 600;
        }

        .skill-type {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .skill-status {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
        }

        /* Logs */
        .log-container {
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 12px;
        }

        .log-line {
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }

        .log-line:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--accent);
            margin-right: 8px;
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--success);
            color: #000;
        }

        .toast.error {
            background: var(--error);
            color: #fff;
        }

        .toast.warning {
            background: var(--warning);
            color: #000;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .service-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .grid, .grid-2 {
                grid-template-columns: 1fr;
            }
            .stat-cards {
                grid-template-columns: 1fr;
            }
            .service-grid {
                grid-template-columns: 1fr;
            }
            .skills-grid {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                gap: 16px;
            }
            .header-right {
                width: 100%;
                justify-content: space-between;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-secondary);
            padding: 30px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-left">
                <h1>🦞 OpenClaw Monitor</h1>
                <span id="connectionStatus" class="status-badge">在线</span>
            </div>
            <div class="header-right">
                <div class="auto-refresh">
                    <span>自动刷新:</span>
                    <span id="countdown">30</span>
                    <span>秒</span>
                </div>
                <button class="btn btn-primary" onclick="refreshAll()">
                    🔄 刷新数据
                </button>
            </div>
        </header>

        <!-- Status Cards -->
        <div class="card" style="margin-bottom: 20px;">
            <div class="stat-cards">
                <div class="stat-card">
                    <div class="stat-value" id="skillCount">-</div>
                    <div class="stat-label">🛠️ 技能数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="taskCount">-</div>
                    <div class="stat-label">⏰ 任务数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="messageCount">-</div>
                    <div class="stat-label">💬 消息数</div>
                </div>
            </div>
        </div>

        <!-- Service Status -->
        <div class="card" style="margin-bottom: 20px;">
            <h2>🌐 服务连通性</h2>
            <div class="service-grid" id="services">
                <div class="loading"><div class="spinner"></div>加载中...</div>
            </div>
        </div>

        <div class="grid grid-2" style="margin-bottom: 20px;">
            <!-- Agent Config -->
            <div class="card">
                <h2>🤖 Agent 配置</h2>
                <div class="agent-list" id="agents">
                    <div class="loading"><div class="spinner"></div>加载中...</div>
                </div>
            </div>

            <!-- Quick Links -->
            <div class="card">
                <h2>🔗 快捷链接</h2>
                <div class="quick-links">
                    <a href="http://opendragon.icu/stock-dashboard/" target="_blank" class="quick-link">
                        <div class="quick-link-icon">📊</div>
                        <div class="quick-link-label">股票看板</div>
                    </a>
                    <a href="http://opendragon.icu/stock-dashboard/cigar_v2.html" target="_blank" class="quick-link">
                        <div class="quick-link-icon">🍷</div>
                        <div class="quick-link-label">雪茄页面</div>
                    </a>
                    <a href="https://github.com/opendragon-ai" target="_blank" class="quick-link">
                        <div class="quick-link-icon">🐙</div>
                        <div class="quick-link-label">GitHub</div>
                    </a>
                </div>
            </div>
        </div>

        <!-- Tasks -->
        <div class="card" style="margin-bottom: 20px;">
            <h2>⏰ 定时任务</h2>
            <div class="task-list" id="tasks">
                <div class="loading"><div class="spinner"></div>加载中...</div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" onclick="showToast('数据刷新成功', 'success')">
                    🔄 刷新数据
                </button>
                <button class="btn btn-danger" onclick="confirmRestart()">
                    🔄 重启网关
                </button>
            </div>
        </div>

        <!-- Skills -->
        <div class="card" style="margin-bottom: 20px;">
            <h2>🛠️ 技能列表</h2>
            <div class="skills-grid" id="skills">
                <div class="loading"><div class="spinner"></div>加载中...</div>
            </div>
        </div>

        <!-- Logs -->
        <div class="card">
            <h2>📝 最近日志</h2>
            <div class="log-container" id="logs">
                <div class="loading"><div class="spinner"></div>加载中...</div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        // ============ 配置 ============
        // 模拟数据 - 后续对接真实 API
        const MOCK_DATA = {
            skills: [
                { name: 'rss-monitor', type: '工作', status: 'installed' },
                { name: 'skill-vetter', type: '安全', status: 'installed' },
                { name: 'humanizer-zh', type: '工具', status: 'installed' },
                { name: 'self-improving-agent', type: 'AI', status: 'installed' },
                { name: 'weather', type: '生活', status: 'installed' },
                { name: 'pdf', type: '工具', status: 'installed' },
                { name: 'xlsx', type: '工具', status: 'installed' },
                { name: 'feishu-doc', type: '集成', status: 'installed' }
            ],
            tasks: [
                { name: 'C114 通信网简报', time: '09:00', status: 'active', restDay: null },
                { name: '十大原则 + 大盘趋势', time: '09:40', status: 'active', restDay: '周六日' },
                { name: '数字货币每日报告', time: '10:00', status: 'active', restDay: null },
                { name: '持仓异常检查', time: '11:00', status: 'active', restDay: '周六日' },
                { name: '持仓异常检查', time: '14:00', status: 'active', restDay: '周六日' },
                { name: '盘后复盘会议', time: '16:30', status: 'active', restDay: '周六日' },
                { name: '晚安提醒', time: '22:30', status: 'active', restDay: null }
            ],
            agents: [
                { name: '亨利大管家', emoji: '👑', meta: 'v1.0 • 精力充沛' },
                { name: '商业奇才', emoji: '💡', meta: 'v1.0 • 决策分析' }
            ],
            services: [
                { name: '飞书', latency: 45, online: true },
                { name: 'GitHub', latency: 120, online: true },
                { name: 'Cloudflare', latency: 38, online: true },
                { name: '腾讯财经', latency: 23, online: true }
            ],
            logs: [
                '[08:00] 系统启动完成',
                '[07:55] 技能加载完成: 8个',
                '[07:50] 定时任务已注册: 7个',
                '[07:45] 飞书连接成功',
                '[07:30] Gateway 启动'
            ]
        };

        // 判断今天是否为休息日
        function isRestDay() {
            const now = new Date();
            const day = now.getDay();
            // 0 = 周日, 6 = 周六
            return day === 0 || day === 6;
        }

        // 获取任务状态（考虑休息日）
        function getTaskStatus(task) {
            if (!task.restDay) {
                return task.status === 'active' ? 'active' : 'paused';
            }
            // 有休息日标记的任务，周六日暂停
            return isRestDay() ? 'paused' : 'active';
        }

        let countdown = 30;
        let countdownTimer = null;

        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', () => {
            loadAll();
            startAutoRefresh();
        });

        // ============ 加载数据 ============
        function loadAll() {
            renderServices();
            renderAgents();
            renderTasks();
            renderSkills();
            renderLogs();
            renderStatCards();
            updateConnectionStatus(true);
        }

        // ============ 渲染函数 ============
        function renderStatCards() {
            document.getElementById('skillCount').textContent = MOCK_DATA.skills.length;
            document.getElementById('taskCount').textContent = MOCK_DATA.tasks.length;
            document.getElementById('messageCount').textContent = '1,234'; // 模拟数据
        }

        function renderServices() {
            const container = document.getElementById('services');
            let html = '';
            
            MOCK_DATA.services.forEach(service => {
                html += `
                    <div class="service-item">
                        <div class="service-name">${service.name}</div>
                        <div class="service-status ${service.online ? 'online' : 'offline'}">
                            ${service.online ? '在线' : '离线'}
                        </div>
                        <div class="service-latency">${service.latency}ms</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function renderAgents() {
            const container = document.getElementById('agents');
            let html = '';
            
            MOCK_DATA.agents.forEach(agent => {
                html += `
                    <div class="agent-item">
                        <div class="agent-avatar">${agent.emoji}</div>
                        <div class="agent-info">
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-meta">${agent.meta}</div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function renderTasks() {
            const container = document.getElementById('tasks');
            let html = '';
            
            MOCK_DATA.tasks.slice(0, 7).forEach(task => {
                const status = getTaskStatus(task);
                const statusText = status === 'active' ? '活跃' : '暂停';
                
                html += `
                    <div class="task-item">
                        <div class="task-info">
                            <span class="task-name">${task.name}</span>
                            <span class="task-schedule">${task.time}</span>
                        </div>
                        <div class="task-status">
                            ${task.restDay ? `<span class="rest-day-badge">${task.restDay}休息</span>` : ''}
                            <span class="task-badge ${status}">${statusText}</span>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function renderSkills() {
            const container = document.getElementById('skills');
            let html = '';
            
            MOCK_DATA.skills.slice(0, 8).forEach(skill => {
                html += `
                    <div class="skill-item">
                        <div class="skill-info">
                            <div class="skill-icon">⚡</div>
                            <div>
                                <div class="skill-name">${skill.name}</div>
                                <div class="skill-type">${skill.type}</div>
                            </div>
                        </div>
                        <span class="skill-status">已安装</span>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function renderLogs() {
            const container = document.getElementById('logs');
            let html = '';
            
            MOCK_DATA.logs.forEach(log => {
                html += `<div class="log-line">${log}</div>`;
            });
            
            container.innerHTML = html;
        }

        function updateConnectionStatus(online) {
            const status = document.getElementById('connectionStatus');
            if (online) {
                status.textContent = '在线';
                status.classList.remove('offline');
            } else {
                status.textContent = '离线';
                status.classList.add('offline');
            }
        }

        // ============ 自动刷新 ============
        function startAutoRefresh() {
            if (countdownTimer) clearInterval(countdownTimer);
            
            countdownTimer = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown;
                
                if (countdown <= 0) {
                    loadAll();
                    countdown = 30;
                }
            }, 1000);
        }

        function refreshAll() {
            countdown = 30;
            document.getElementById('countdown').textContent = countdown;
            loadAll();
            showToast('数据已刷新', 'success');
        }

        // ============ 操作 ============
        function confirmRestart() {
            if (confirm('确定要重启网关吗？')) {
                showToast('网关重启需要管理员权限，请使用命令行', 'warning');
            }
        }

        // ============ Toast ============
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
