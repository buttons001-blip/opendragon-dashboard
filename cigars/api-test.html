<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飞书 API 测试</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #fff; }
    .result { background: #2d2d44; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    button { padding: 10px 20px; margin: 5px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #764ba2; }
  </style>
</head>
<body>
  <h1>🧪 飞书 API 测试工具</h1>
  
  <div>
    <button onclick="testGetToken()">1. 获取 Token</button>
    <button onclick="testGetRecord()">2. 获取记录</button>
    <button onclick="testUpdateRecord()">3. 更新记录</button>
    <button onclick="testCreateRecord()">4. 创建记录</button>
  </div>
  
  <div id="log" class="result"></div>

  <script>
    const FEISHU_CONFIG = {
      appToken: 'LxtibLI9eajhA3sLXYVcYSfynRf',
      tableId: 'tbl2AoMbImpRz0vG',
      appId: 'cli_a923ab8033781cc6',
      appSecret: '6znpJICLLDKf30qQE0usGmdgS4kFkt7S',
      testRecordId: 'rec274YQNcWVds' // Punch Coronas A/T
    };
    
    let token = '';
    
    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
      div.textContent = msg;
      document.getElementById('log').appendChild(div);
    }
    
    async function testGetToken() {
      document.getElementById('log').innerHTML = '';
      log('正在获取 token...');
      
      try {
        const resp = await fetch('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            app_id: FEISHU_CONFIG.appId,
            app_secret: FEISHU_CONFIG.appSecret
          })
        });
        
        const data = await resp.json();
        log('响应状态码：' + resp.status);
        log('响应数据：' + JSON.stringify(data, null, 2));
        
        if (data.code === 0 && data.tenant_access_token) {
          token = data.tenant_access_token;
          log('✅ Token 获取成功：' + token.substring(0, 20) + '...', 'success');
        } else {
          log('❌ Token 获取失败', 'error');
        }
      } catch (e) {
        log('❌ 错误：' + e.message, 'error');
      }
    }
    
    async function testGetRecord() {
      if (!token) { log('请先获取 token', 'error'); return; }
      
      log('\n正在获取记录 ' + FEISHU_CONFIG.testRecordId + '...');
      
      try {
        const resp = await fetch(`https://open.feishu.cn/open-apis/bitable/v1/apps/${FEISHU_CONFIG.appToken}/tables/${FEISHU_CONFIG.tableId}/records/${FEISHU_CONFIG.testRecordId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const data = await resp.json();
        log('响应状态码：' + resp.status);
        log('响应数据：' + JSON.stringify(data, null, 2));
        
        if (data.code === 0) {
          log('✅ 记录获取成功', 'success');
          log('品牌：' + data.data.fields['品牌']);
          log('型号：' + data.data.fields['型号']);
          log('地点：' + data.data.fields['地点']);
          log('剩余数量：' + (data.data.fields['剩余数量'] || '未设置'));
        } else {
          log('❌ 记录获取失败', 'error');
        }
      } catch (e) {
        log('❌ 错误：' + e.message, 'error');
      }
    }
    
    async function testUpdateRecord() {
      if (!token) { log('请先获取 token', 'error'); return; }
      
      log('\n正在更新记录...');
      
      try {
        const fields = {
          '地点': '测试_' + new Date().getTime(),
          '剩余数量': Math.floor(Math.random() * 100)
        };
        
        log('更新字段：' + JSON.stringify(fields, null, 2));
        
        const resp = await fetch(`https://open.feishu.cn/open-apis/bitable/v1/apps/${FEISHU_CONFIG.appToken}/tables/${FEISHU_CONFIG.tableId}/records/${FEISHU_CONFIG.testRecordId}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ fields })
        });
        
        const data = await resp.json();
        log('响应状态码：' + resp.status);
        log('响应数据：' + JSON.stringify(data, null, 2));
        
        if (data.code === 0) {
          log('✅ 记录更新成功！', 'success');
        } else {
          log('❌ 记录更新失败：' + data.msg, 'error');
        }
      } catch (e) {
        log('❌ 错误：' + e.message, 'error');
      }
    }
    
    async function testCreateRecord() {
      if (!token) { log('请先获取 token', 'error'); return; }
      
      log('\n正在创建新记录...');
      
      try {
        const fields = {
          '品牌': 'Test Brand',
          '型号': 'Test Model ' + new Date().getTime(),
          '产地': '古巴',
          '数量': 10,
          '环径': 42,
          '长度': 127,
          '现单价': 10.5,
          '生产日期': 2024,
          '地点': '测试',
          '包装': '木盒'
        };
        
        log('新记录字段：' + JSON.stringify(fields, null, 2));
        
        const resp = await fetch(`https://open.feishu.cn/open-apis/bitable/v1/apps/${FEISHU_CONFIG.appToken}/tables/${FEISHU_CONFIG.tableId}/records`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ fields })
        });
        
        const data = await resp.json();
        log('响应状态码：' + resp.status);
        log('响应数据：' + JSON.stringify(data, null, 2));
        
        if (data.code === 0) {
          log('✅ 记录创建成功！ID: ' + data.data.record_id, 'success');
        } else {
          log('❌ 记录创建失败：' + data.msg, 'error');
        }
      } catch (e) {
        log('❌ 错误：' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
