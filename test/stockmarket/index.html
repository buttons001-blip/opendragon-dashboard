<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDragon Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { text-align: center; max-width: 900px; width: 100%; }
        
        /* Logo区域 */
        .logo-section {
            margin-bottom: 50px;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        h1 { 
            color: white; 
            font-size: 2.5rem; 
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2); 
        }
        .subtitle { 
            color: rgba(255,255,255,0.8); 
            font-size: 1.1rem; 
        }
        
        /* 卡片网格 */
        .card-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 25px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .nav-card {
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 20px;
            padding: 40px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .nav-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            background: white; 
        }
        
        .card-icon { 
            width: 70px; 
            height: 70px; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 32px;
            margin-bottom: 5px;
        }
        .stock-icon { background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); }
        .cigar-icon { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); }
        .claw-icon { background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%); }
        
        .card-title { 
            font-size: 1.4rem; 
            font-weight: 600; 
            color: #1a1a1a; 
        }
        .card-desc { 
            font-size: 0.95rem; 
            color: #666; 
        }
        .card-arrow { 
            font-size: 24px; 
            color: #999; 
            transition: transform 0.3s, color 0.3s;
            margin-top: 10px;
        }
        .nav-card:hover .card-arrow { 
            transform: translateX(5px); 
            color: #333; 
        }
        
        @media (max-width: 640px) {
            h1 { font-size: 2rem; }
            .card-grid { grid-template-columns: 1fr; }
            .nav-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">
                <div class="logo-icon">🐉</div>
                <h1>OpenDragon</h1>
            </div>
            <p class="subtitle">个人数据管理中心</p>
        </div>
        
        <div class="card-grid">
            <a href="https://stock.opendragon.icu" class="nav-card">
                <div class="card-icon stock-icon">📈</div>
                <div class="card-title">股票</div>
                <div class="card-desc">持仓管理与实时行情</div>
                <span class="card-arrow">→</span>
            </a>
            <a href="ca.html" class="nav-card">
                <div class="card-icon cigar-icon">🚬</div>
                <div class="card-title">雪茄</div>
                <div class="card-desc">品牌库与品鉴记录</div>
                <span class="card-arrow">→</span>
            </a>
            <a href="https://openclaw.opendragon.icu" class="nav-card">
                <div class="card-icon claw-icon">🤖</div>
                <div class="card-title">OpenClaw 看板</div>
                <div class="card-desc">爬虫状态监控</div>
                <span class="card-arrow">→</span>
            </a>
        </div>
    </div>
</body>
</html>
