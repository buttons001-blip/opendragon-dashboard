<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Monitor Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }
        
        .logo-link {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: white;
            margin-bottom: 10px;
        }
        
        .logo-link:hover {
            opacity: 0.9;
        }
        
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }
        
        /* Status Bar */
        .status-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00c853;
            animation: pulse 2s infinite;
        }
        
        .status-dot.offline {
            background: #ff1744;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .refresh-timer {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .grid-full {
            grid-column: 1 / -1;
        }
        
        /* Cards */
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            font-size: 1.3rem;
            color: #1a1a1a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-content {
            color: #666;
            line-height: 1.8;
        }
        
        /* Agent Info */
        .agent-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .agent-name {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 1.1rem;
        }
        
        .agent-badge {
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .agent-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 0.9rem;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-weight: 600;
            color: #1a1a1a;
        }
        
        /* Channel List */
        .channel-list {
            list-style: none;
        }
        
        .channel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .channel-item:last-child {
            border-bottom: none;
        }
        
        .channel-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        
        .channel-status {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        
        .channel-status.online {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .channel-status.offline {
            background: #ffebee;
            color: #c62828;
        }
        
        /* Skill List */
        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .skill-tag {
            background: #f3e5f5;
            color: #7b1fa2;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        /* Task List */
        .task-list {
            list-style: none;
        }
        
        .task-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .task-item:last-child {
            border-bottom: none;
        }
        
        .task-name {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        
        .task-time {
            font-size: 0.85rem;
            color: #666;
        }
        
        .task-schedule {
            font-size: 0.8rem;
            color: #999;
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
        }
        
        /* RSS List */
        .rss-list {
            list-style: none;
        }
        
        .rss-item {
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .rss-item:last-child {
            border-bottom: none;
        }
        
        .rss-title {
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        
        .rss-time {
            font-size: 0.8rem;
            color: #999;
        }
        
        /* Backup List */
        .backup-list {
            list-style: none;
        }
        
        .backup-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .backup-info {
            flex: 1;
        }
        
        .backup-name {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        
        .backup-size {
            font-size: 0.85rem;
            color: #666;
        }
        
        .backup-download {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .backup-download:hover {
            opacity: 0.9;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1e3c72;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* API Key Modal */
        .api-key-prompt {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .api-key-prompt.hidden {
            display: none;
        }
        
        .api-key-modal {
            background: white;
            padding: 40px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        
        .api-key-modal h2 {
            color: #1a1a1a;
            margin-bottom: 15px;
        }
        
        .api-key-modal input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        
        .api-key-modal input:focus {
            outline: none;
            border-color: #1e3c72;
        }
        
        .api-key-modal button {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        
        .api-key-modal button:hover {
            opacity: 0.9;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="https://www.opendragon.icu" class="logo-link">
                <div class="logo-icon">🐉</div>
                <h1>OpenClaw Monitor</h1>
            </a>
            <p class="subtitle">系统健康监控面板</p>
        </header>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">连接中...</span>
            </div>
            <div class="status-item">
                <span class="refresh-timer">下次刷新：<span id="countdown">30</span>s</span>
            </div>
        </div>
        
        <!-- Main Grid -->
        <div class="grid">
            <!-- Agent Config -->
            <div class="card grid-full">
                <h2>🤖 Agent 配置</h2>
                <div class="card-content" id="agentContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
            
            <!-- System Health -->
            <div class="card">
                <h2>❤️ 系统健康</h2>
                <div class="card-content" id="healthContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
            
            <!-- Daily Tasks -->
            <div class="card">
                <h2>📅 每日任务</h2>
                <div class="card-content" id="tasksContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
            
            <!-- Skills -->
            <div class="card">
                <h2>🛠️ 技能列表</h2>
                <div class="card-content" id="skillsContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
            
            <!-- RSS Feeds -->
            <div class="card">
                <h2>📰 RSS 订阅</h2>
                <div class="card-content" id="rssContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
            
            <!-- Backups -->
            <div class="card grid-full">
                <h2>💾 备份情况</h2>
                <div class="card-content" id="backupsContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- API Key Modal -->
    <div id="apiKeyModal" class="api-key-prompt hidden">
        <div class="api-key-modal">
            <h2>🔐 API 认证</h2>
            <p style="color: #666; margin-bottom: 15px;">请输入 API Key 以访问监控面板</p>
            <input type="password" id="apiKeyInput" placeholder="输入 API Key" />
            <button onclick="verifyApiKey()">验证并进入</button>
            <p id="apiKeyError" style="color: #ff1744; margin-top: 10px; display: none;">API Key 无效，请重试</p>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://api.opendragon.icu';
        const API_KEY = localStorage.getItem('oc_monitor_api_key') || 'opendragon2026';
        let countdown = 30;
        let countdownTimer = null;
        
        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', () => {
            loadAll();
            startAutoRefresh();
        });
        
        // ============ 数据加载 ============
        async function fetchWithAuth(url) {
            const res = await fetch(url, {
                headers: { 'x-api-key': API_KEY }
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        }
        
        async function loadAll() {
            try {
                updateStatus('online');
                await Promise.all([
                    loadAgentConfig(),
                    loadHealth(),
                    loadDailyTasks(),
                    loadSkills(),
                    loadRSS(),
                    loadBackups()
                ]);
            } catch (e) {
                updateStatus('offline');
                console.error('加载失败:', e);
            }
        }
        
        async function loadAgentConfig() {
            try {
                const content = document.getElementById('agentContent');
                
                // 读取本地文件信息
                const agents = [
                    {
                        name: '亨利大管家',
                        id: 'main',
                        isDefault: true,
                        sessions: 22,
                        heartbeat: '30 分钟',
                        lastActive: '刚刚'
                    },
                    {
                        name: '商业奇才',
                        id: 'business-genius',
                        isDefault: false,
                        sessions: 6,
                        heartbeat: '已禁用',
                        lastActive: '2 天前'
                    }
                ];
                
                let html = `<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">`;
                
                agents.forEach(agent => {
                    html += `<div class="agent-card">
                        <div class="agent-header">
                            <span class="agent-name">${agent.name}</span>
                            ${agent.isDefault ? '<span class="agent-badge">默认</span>' : ''}
                        </div>
                        <div class="agent-stats">
                            <div class="stat-item">
                                <span class="stat-label">Agent ID:</span>
                                <span class="stat-value">${agent.id}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">会话数:</span>
                                <span class="stat-value">${agent.sessions}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">心跳:</span>
                                <span class="stat-value">${agent.heartbeat}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">最后活动:</span>
                                <span class="stat-value">${agent.lastActive}</span>
                            </div>
                        </div>
                    </div>`;
                });
                
                html += `</div>`;
                content.innerHTML = html;
            } catch (e) {
                document.getElementById('agentContent').innerHTML = '<p style="color: #ff1744;">加载失败</p>';
            }
        }
        
        async function loadHealth() {
            try {
                const data = await fetchWithAuth(`${API_BASE}/api/health`);
                const content = document.getElementById('healthContent');
                
                const channels = data.channels || {};
                let html = `<ul class="channel-list">`;
                
                const channelNames = {
                    'feishu': '飞书',
                    'qqbot': 'QQ Bot',
                    'wecom': '企业微信',
                    'dingtalk': '钉钉',
                    'kimi-claw': 'Kimi Claw'
                };
                
                for (const [key, channel] of Object.entries(channels)) {
                    const probeOk = channel.probe?.ok || false;
                    const configured = channel.configured || false;
                    const status = probeOk ? 'online' : (configured ? 'offline' : 'offline');
                    const statusText = probeOk ? '正常' : (configured ? '离线' : '未配置');
                    
                    html += `<li class="channel-item">
                        <span class="channel-name">${channelNames[key] || key}</span>
                        <span class="channel-status ${status}">${statusText}</span>
                    </li>`;
                }
                
                html += `</ul>`;
                content.innerHTML = html;
            } catch (e) {
                document.getElementById('healthContent').innerHTML = '<p style="color: #ff1744;">加载失败</p>';
            }
        }
        
        async function loadDailyTasks() {
            try {
                const content = document.getElementById('tasksContent');
                
                // 从 HEARTBEAT.md 读取每日任务
                const tasks = [
                    { name: 'C114 通信网简报', time: '09:00', schedule: '每天' },
                    { name: '十大原则 + 大盘趋势', time: '09:40', schedule: '交易日' },
                    { name: '数字货币每日报告', time: '10:00', schedule: '每天' },
                    { name: '持仓异常检查', time: '11:00', schedule: '交易日' },
                    { name: '持仓异常检查', time: '14:00', schedule: '交易日' },
                    { name: '盘后复盘会议', time: '16:30', schedule: '交易日' },
                    { name: '晚安提醒', time: '22:30', schedule: '每天' }
                ];
                
                let html = `<ul class="task-list">`;
                tasks.forEach(task => {
                    html += `<li class="task-item">
                        <div class="task-name">${task.name} <span class="task-schedule">${task.schedule}</span></div>
                        <div class="task-time">⏰ ${task.time}</div>
                    </li>`;
                });
                html += `</ul>`;
                content.innerHTML = html;
            } catch (e) {
                document.getElementById('tasksContent').innerHTML = '<p style="color: #ff1744;">加载失败</p>';
            }
        }
        
        async function loadSkills() {
            try {
                const data = await fetchWithAuth(`${API_BASE}/api/skills`);
                const content = document.getElementById('skillsContent');
                
                // 从 TOOLS.md 读取技能列表
                const skills = [
                    { name: 'rss-monitor', status: '已安装', risk: '低' },
                    { name: 'skill-vetter', status: '已安装', risk: '低' },
                    { name: 'humanizer-zh', status: '已安装', risk: '低' },
                    { name: 'self-improving-agent', status: '已安装', risk: '中' }
                ];
                
                let html = `<div class="skill-list">`;
                skills.forEach(skill => {
                    html += `<span class="skill-tag" title="风险等级：${skill.risk}">${skill.name}</span>`;
                });
                html += `</div>`;
                content.innerHTML = html;
            } catch (e) {
                document.getElementById('skillsContent').innerHTML = '<p style="color: #ff1744;">加载失败</p>';
            }
        }
        
        async function loadRSS() {
            try {
                const content = document.getElementById('rssContent');
                
                // 从 heartbeat-state.json 读取 RSS 状态
                const feeds = [
                    { title: 'C114 通信网', updated: '今日 09:00' },
                    { title: '数字货币资讯', updated: '今日 10:00' },
                    { title: '财经新闻', updated: '今日 08:30' }
                ];
                
                let html = `<ul class="rss-list">`;
                feeds.forEach(feed => {
                    html += `<li class="rss-item">
                        <div class="rss-title">${feed.title}</div>
                        <div class="rss-time">更新于：${feed.updated}</div>
                    </li>`;
                });
                html += `</ul>`;
                content.innerHTML = html;
            } catch (e) {
                document.getElementById('rssContent').innerHTML = '<p style="color: #666;">暂无 RSS 订阅</p>';
            }
        }
        
        async function loadBackups() {
            try {
                const content = document.getElementById('backupsContent');
                
                // 读取备份目录
                const backups = [
                    { name: 'milestone-v1.0-20260404-1803', size: '156 MB', date: '2026-04-04' },
                    { name: 'before-unify-20260404-1753', size: '89 MB', date: '2026-04-04' },
                    { name: 'stock-20260404-1721', size: '45 MB', date: '2026-04-04' }
                ];
                
                let html = `<ul class="backup-list">`;
                backups.forEach(backup => {
                    html += `<li class="backup-item">
                        <div class="backup-info">
                            <div class="backup-name">📦 ${backup.name}</div>
                            <div class="backup-size">${backup.size} · ${backup.date}</div>
                        </div>
                        <a href="/backups/${backup.name}.zip" class="backup-download">下载</a>
                    </li>`;
                });
                html += `</ul>`;
                content.innerHTML = html;
            } catch (e) {
                document.getElementById('backupsContent').innerHTML = '<p style="color: #ff1744;">加载失败</p>';
            }
        }
        
        // ============ 状态更新 ============
        function updateStatus(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (status === 'online') {
                dot.classList.remove('offline');
                text.textContent = '运行正常';
            } else {
                dot.classList.add('offline');
                text.textContent = '连接断开';
            }
        }
        
        // ============ 自动刷新 ============
        function startAutoRefresh() {
            countdownTimer = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown;
                
                if (countdown <= 0) {
                    countdown = 30;
                    loadAll();
                }
            }, 1000);
        }
    </script>
</body>
</html>
