<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Monitor Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Header */
        header {
            text-align: center;
            margin-bottom: 50px;
            padding: 20px 0;
        }
        
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }
        
        /* Status Bar */
        .status-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00c853;
            animation: pulse 2s infinite;
        }
        
        .status-dot.offline {
            background: #ff1744;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .refresh-timer {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        /* Cards */
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            font-size: 1.3rem;
            color: #1a1a1a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-content {
            color: #666;
            line-height: 1.8;
        }
        
        /* Channel List */
        .channel-list {
            list-style: none;
        }
        
        .channel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .channel-item:last-child {
            border-bottom: none;
        }
        
        .channel-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        
        .channel-status {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        
        .channel-status.online {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .channel-status.offline {
            background: #ffebee;
            color: #c62828;
        }
        
        /* Skill List */
        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .skill-tag {
            background: #f3e5f5;
            color: #7b1fa2;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        /* RSS List */
        .rss-list {
            list-style: none;
        }
        
        .rss-item {
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .rss-item:last-child {
            border-bottom: none;
        }
        
        .rss-title {
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        
        .rss-time {
            font-size: 0.8rem;
            color: #999;
        }
        
        /* Agent Info */
        .agent-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .agent-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .agent-stat:last-child {
            margin-bottom: 0;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-weight: 600;
            color: #1a1a1a;
        }
        
        /* Log List */
        .log-list {
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            background: #1a1a2e;
            color: #00d4ff;
            padding: 15px;
            border-radius: 8px;
        }
        
        .log-item {
            margin-bottom: 8px;
            word-break: break-all;
        }
        
        .log-time {
            color: #666;
            margin-right: 10px;
        }
        
        /* API Key Modal */
        .api-key-prompt {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .api-key-prompt.hidden {
            display: none;
        }
        
        .api-key-modal {
            background: white;
            padding: 40px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        
        .api-key-modal h2 {
            color: #1a1a1a;
            margin-bottom: 15px;
        }
        
        .api-key-modal input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        
        .api-key-modal input:focus {
            outline: none;
            border-color: #1e3c72;
        }
        
        .api-key-modal button {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        
        .api-key-modal button:hover {
            opacity: 0.9;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1e3c72;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 OpenClaw Monitor</h1>
            <p class="subtitle">系统健康监控面板</p>
        </header>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">连接中...</span>
            </div>
            <div class="status-item">
                <span class="refresh-timer">下次刷新：<span id="countdown">30</span>s</span>
            </div>
        </div>
        
        <!-- Main Grid -->
        <div class="grid">
            <!-- Agent Config -->
            <div class="card">
                <h2>🤖 Agent 配置</h2>
                <div class="card-content" id="agentContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
            
            <!-- System Health -->
            <div class="card">
                <h2>❤️ 系统健康</h2>
                <div class="card-content" id="healthContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
            
            <!-- Skills -->
            <div class="card">
                <h2>🛠️ 技能列表</h2>
                <div class="card-content" id="skillsContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
            
            <!-- RSS Feeds -->
            <div class="card">
                <h2>📰 RSS 订阅</h2>
                <div class="card-content" id="rssContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
            
            <!-- Tasks -->
            <div class="card">
                <h2>⏰ 定时任务</h2>
                <div class="card-content" id="tasksContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
            
            <!-- Recent Logs -->
            <div class="card grid-full">
                <h2>📝 最近日志</h2>
                <div class="card-content" id="logsContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- API Key Modal -->
    <div id="apiKeyModal" class="api-key-prompt hidden">
        <div class="api-key-modal">
            <h2>🔐 API 认证</h2>
            <p style="color: #666; margin-bottom: 15px;">请输入 API Key 以访问监控面板</p>
            <input type="password" id="apiKeyInput" placeholder="输入 API Key" />
            <button onclick="verifyApiKey()">验证并进入</button>
            <p id="apiKeyError" style="color: #ff1744; margin-top: 10px; display: none;">API Key 无效，请重试</p>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://api.opendragon.icu';
        let API_KEY = localStorage.getItem('oc_monitor_api_key') || '';
        let countdown = 30;
        let countdownTimer = null;
        
        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', () => {
            if (!API_KEY) {
                document.getElementById('apiKeyModal').classList.remove('hidden');
            } else {
                loadAll();
                startAutoRefresh();
            }
            
            // 回车提交 API Key
            document.getElementById('apiKeyInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyApiKey();
            });
        });
        
        // ============ API Key 验证 ============
        async function verifyApiKey() {
            const input = document.getElementById('apiKeyInput');
            const errorMsg = document.getElementById('apiKeyError');
            const key = input.value.trim();
            
            if (!key) {
                errorMsg.textContent = '请输入 API Key';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/health`, {
                    headers: { 'x-api-key': key }
                });
                
                if (res.ok) {
                    API_KEY = key;
                    localStorage.setItem('oc_monitor_api_key', key);
                    document.getElementById('apiKeyModal').classList.add('hidden');
                    loadAll();
                    startAutoRefresh();
                } else {
                    errorMsg.textContent = 'API Key 无效，请重试';
                    errorMsg.style.display = 'block';
                }
            } catch (e) {
                errorMsg.textContent = '无法连接服务器';
                errorMsg.style.display = 'block';
            }
        }
        
        // ============ 数据加载 ============
        async function fetchWithAuth(url) {
            const res = await fetch(url, {
                headers: { 'x-api-key': API_KEY }
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        }
        
        async function loadAll() {
            try {
                updateStatus('online');
                await Promise.all([
                    loadAgentConfig(),
                    loadHealth(),
                    loadSkills(),
                    loadRSS(),
                    loadTasks(),
                    loadLogs()
                ]);
            } catch (e) {
                updateStatus('offline');
                console.error('加载失败:', e);
            }
        }
        
        async function loadAgentConfig() {
            try {
                const data = await fetchWithAuth(`${API_BASE}/api/agent/config`);
                const content = document.getElementById('agentContent');
                
                const agents = data.agents || [];
                const defaultAgent = agents.find(a => a.isDefault) || agents[0];
                
                let html = `<div class="agent-info">`;
                html += `<div class="agent-stat">
                    <span class="stat-label">默认 Agent:</span>
                    <span class="stat-value">${defaultAgent?.agentId || 'N/A'}</span>
                </div>`;
                html += `<div class="agent-stat">
                    <span class="stat-label">会话数量:</span>
                    <span class="stat-value">${defaultAgent?.sessions?.count || 0}</span>
                </div>`;
                html += `<div class="agent-stat">
                    <span class="stat-label">心跳间隔:</span>
                    <span class="stat-value">${defaultAgent?.heartbeat?.every || 'disabled'}</span>
                </div>`;
                html += `</div>`;
                
                if (defaultAgent?.sessions?.recent?.length > 0) {
                    html += `<p style="font-size: 0.9rem; margin-top: 15px;"><strong>最近会话:</strong></p>`;
                    html += `<ul style="font-size: 0.85rem; margin-top: 8px;">`;
                    defaultAgent.sessions.recent.slice(0, 3).forEach(s => {
                        const age = Math.floor((Date.now() - s.updatedAt) / 60000);
                        html += `<li style="color: #666; margin-bottom: 4px;">${s.key.split(':').pop()} (${age}分钟前)</li>`;
                    });
                    html += `</ul>`;
                }
                
                content.innerHTML = html;
            } catch (e) {
                document.getElementById('agentContent').innerHTML = '<p style="color: #ff1744;">加载失败</p>';
            }
        }
        
        async function loadHealth() {
            try {
                const data = await fetchWithAuth(`${API_BASE}/api/health`);
                const content = document.getElementById('healthContent');
                
                const channels = data.channels || {};
                let html = `<ul class="channel-list">`;
                
                for (const [key, channel] of Object.entries(channels)) {
                    const probeOk = channel.probe?.ok || false;
                    const configured = channel.configured || false;
                    const status = probeOk ? 'online' : 'offline';
                    const statusText = probeOk ? '正常' : (configured ? '离线' : '未配置');
                    
                    const channelNames = {
                        'feishu': '飞书',
                        'qqbot': 'QQ Bot',
                        'wecom': '企业微信',
                        'dingtalk': '钉钉',
                        'kimi-claw': 'Kimi Claw'
                    };
                    
                    html += `<li class="channel-item">
                        <span class="channel-name">${channelNames[key] || key}</span>
                        <span class="channel-status ${status}">${statusText}</span>
                    </li>`;
                }
                
                html += `</ul>`;
                content.innerHTML = html;
            } catch (e) {
                document.getElementById('healthContent').innerHTML = '<p style="color: #ff1744;">加载失败</p>';
            }
        }
        
        async function loadSkills() {
            try {
                const data = await fetchWithAuth(`${API_BASE}/api/skills`);
                const content = document.getElementById('skillsContent');
                
                const skills = data.skills || [];
                if (skills.length > 0) {
                    let html = `<div class="skill-list">`;
                    skills.forEach(skill => {
                        html += `<span class="skill-tag">${skill.name || skill}</span>`;
                    });
                    html += `</div>`;
                    content.innerHTML = html;
                } else {
                    content.innerHTML = '<p style="color: #666;">暂无技能</p>';
                }
            } catch (e) {
                document.getElementById('skillsContent').innerHTML = '<p style="color: #ff1744;">加载失败</p>';
            }
        }
        
        async function loadRSS() {
            try {
                const data = await fetchWithAuth(`${API_BASE}/api/rss`);
                const content = document.getElementById('rssContent');
                
                const feeds = data.feeds || [];
                if (feeds.length > 0) {
                    let html = `<ul class="rss-list">`;
                    feeds.slice(0, 5).forEach(feed => {
                        const time = new Date(feed.updatedAt || feed.lastBuildDate || Date.now()).toLocaleString('zh-CN');
                        html += `<li class="rss-item">
                            <div class="rss-title">${feed.title || '未命名'}</div>
                            <div class="rss-time">${time}</div>
                        </li>`;
                    });
                    html += `</ul>`;
                    content.innerHTML = html;
                } else {
                    content.innerHTML = '<p style="color: #666;">暂无 RSS 订阅</p>';
                }
            } catch (e) {
                document.getElementById('rssContent').innerHTML = '<p style="color: #666;">RSS 服务未配置</p>';
            }
        }
        
        async function loadTasks() {
            try {
                const data = await fetchWithAuth(`${API_BASE}/api/tasks`);
                const content = document.getElementById('tasksContent');
                
                const tasks = data.tasks || [];
                if (tasks.length > 0) {
                    let html = `<ul style="font-size: 0.9rem;">`;
                    tasks.forEach(task => {
                        html += `<li style="padding: 8px 0; border-bottom: 1px solid #f0f0f0;">
                            <strong>${task.name || task.command}</strong>
                            <span style="color: #666; font-size: 0.85rem;"> - ${task.schedule || 'N/A'}</span>
                        </li>`;
                    });
                    html += `</ul>`;
                    content.innerHTML = html;
                } else {
                    content.innerHTML = '<p style="color: #666;">暂无定时任务</p>';
                }
            } catch (e) {
                document.getElementById('tasksContent').innerHTML = '<p style="color: #ff1744;">加载失败</p>';
            }
        }
        
        async function loadLogs() {
            try {
                const data = await fetchWithAuth(`${API_BASE}/api/logs?lines=30`);
                const content = document.getElementById('logsContent');
                
                const logs = data.logs || data.output || [];
                if (Array.isArray(logs) && logs.length > 0) {
                    let html = `<div class="log-list">`;
                    logs.slice(-30).forEach(log => {
                        const time = new Date().toLocaleTimeString('zh-CN');
                        html += `<div class="log-item">
                            <span class="log-time">[${time}]</span>${log}
                        </div>`;
                    });
                    html += `</div>`;
                    content.innerHTML = html;
                } else {
                    content.innerHTML = '<p style="color: #666;">暂无日志</p>';
                }
            } catch (e) {
                document.getElementById('logsContent').innerHTML = '<p style="color: #ff1744;">加载失败</p>';
            }
        }
        
        // ============ 状态更新 ============
        function updateStatus(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (status === 'online') {
                dot.classList.remove('offline');
                text.textContent = '运行正常';
            } else {
                dot.classList.add('offline');
                text.textContent = '连接断开';
            }
        }
        
        // ============ 自动刷新 ============
        function startAutoRefresh() {
            countdownTimer = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown;
                
                if (countdown <= 0) {
                    countdown = 30;
                    loadAll();
                }
            }, 1000);
        }
    </script>
</body>
</html>
