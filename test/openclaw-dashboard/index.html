<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Monitor - 亨利大管家</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222e;
            --border: #2a2a3a;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --accent: #00d4ff;
            --accent-hover: #00b8e6;
            --success: #00e676;
            --warning: #ffab00;
            --error: #ff5252;
            --info: #448aff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(0, 230, 118, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .status-badge.offline {
            background: rgba(255, 82, 82, 0.15);
            color: var(--error);
        }

        .status-badge.offline::before {
            background: var(--error);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        #countdown {
            font-weight: 700;
            color: var(--accent);
            min-width: 28px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-danger {
            background: rgba(255, 82, 82, 0.15);
            color: var(--error);
            border: 1px solid rgba(255, 82, 82, 0.3);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Status Cards */
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* Service Status */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .service-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .service-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .service-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .service-status.online {
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
        }

        .service-status.offline {
            background: rgba(255, 82, 82, 0.15);
            color: var(--error);
        }

        .service-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .service-latency {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
            font-variant-numeric: tabular-nums;
        }

        /* Agent Config */
        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .agent-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .agent-item:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .agent-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--success));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .agent-info {
            flex: 1;
        }

        .agent-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .agent-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .agent-arrow {
            color: var(--text-secondary);
            font-size: 18px;
        }

        /* Quick Links */
        .quick-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .quick-link {
            flex: 1;
            min-width: 100px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .quick-link:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            text-decoration: none;
        }

        .quick-link-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .quick-link-label {
            font-size: 13px;
            font-weight: 600;
        }

        /* Tasks */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-name {
            font-size: 14px;
            font-weight: 500;
        }

        .task-schedule {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .task-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .task-badge.active {
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
        }

        .task-badge.paused {
            background: rgba(255, 171, 0, 0.15);
            color: var(--warning);
        }

        .rest-day-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 8px;
            background: rgba(136, 136, 160, 0.15);
            color: var(--text-secondary);
        }

        /* Skills */
        .skills-container, .rss-container {
            position: relative;
        }

        .skills-grid, .rss-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-height: 320px;
            overflow-y: auto;
        }

        .skill-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .skill-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .skill-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .skill-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(0, 212, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .skill-name {
            font-size: 13px;
            font-weight: 600;
        }

        .skill-type {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .skill-status {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
        }

        .skill-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* RSS List */
        .rss-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rss-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .rss-info {
            flex: 1;
        }

        .rss-name {
            font-size: 14px;
            font-weight: 500;
        }

        .rss-url {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 300px;
        }

        .rss-count {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .page-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover, .page-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* File Manager */
        .file-manager {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .file-toolbar {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
        }

        .path-bar {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            overflow-x: auto;
        }

        .path-item {
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }

        .path-item:hover {
            background: var(--bg-card-hover);
            color: var(--accent);
        }

        .file-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: var(--bg-card-hover);
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .file-icon.folder { color: var(--warning); }
        .file-icon.file { color: var(--text-secondary); }
        .file-icon.md { color: var(--accent); }

        .file-name {
            flex: 1;
            font-size: 14px;
        }

        .file-size {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 80px;
            text-align: right;
        }

        .file-date {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 140px;
            text-align: right;
        }

        /* Logs */
        .log-container {
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 12px;
        }

        .log-line {
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }

        .log-line:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--accent);
            margin-right: 8px;
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow: hidden;
            transform: scale(0.9);
            transition: all 0.3s ease;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--success);
            color: #000;
        }

        .toast.error {
            background: var(--error);
            color: #fff;
        }

        .toast.warning {
            background: var(--warning);
            color: #000;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .service-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .grid, .grid-2 {
                grid-template-columns: 1fr;
            }
            .stat-cards {
                grid-template-columns: 1fr;
            }
            .service-grid {
                grid-template-columns: 1fr;
            }
            .skills-grid, .rss-grid {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                gap: 16px;
            }
            .header-right {
                width: 100%;
                justify-content: space-between;
            }
            .file-item {
                flex-wrap: wrap;
            }
            .file-size, .file-date {
                display: none;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-secondary);
            padding: 30px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div id="loginOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0f;z-index:9999;display:flex;align-items:center;justify-content:center;">
        <div style="background:#1a1a24;border:1px solid #2a2a3a;border-radius:16px;padding:40px;width:90%;max-width:400px;text-align:center;">
            <div style="font-size:48px;margin-bottom:20px;">🔐</div>
            <h2 style="color:#00d4ff;margin-bottom:10px;">OpenClaw Monitor</h2>
            <p style="color:#8888a0;margin-bottom:30px;">请输入访问密码</p>
            <input type="password" id="apiKeyInput" placeholder="输入 API Key" 
                style="width:100%;padding:14px;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:10px;color:#e8e8ed;font-size:16px;margin-bottom:15px;text-align:center;">
            <button onclick="verifyApiKey()" 
                style="width:100%;padding:14px;background:#00d4ff;border:none;border-radius:10px;color:#000;font-size:16px;font-weight:600;cursor:pointer;">
                确认访问
            </button>
            <p id="loginError" style="color:#ff5252;margin-top:15px;display:none;">密码错误，请重试</p>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-left">
                <h1>🦞 OpenClaw Monitor</h1>
                <span id="connectionStatus" class="status-badge">在线</span>
            </div>
            <div class="header-right">
                <div class="auto-refresh">
                    <span>自动刷新:</span>
                    <span id="countdown">30</span>
                    <span>秒</span>
                </div>
                <button class="btn btn-primary" onclick="refreshAll()">
                    🔄 刷新数据
                </button>
            </div>
        </header>

        <!-- Status Cards -->
        <div class="card" style="margin-bottom: 20px;">
            <div class="stat-cards">
                <div class="stat-card">
                    <div class="stat-value" id="skillCount">-</div>
                    <div class="stat-label">🛠️ 技能数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="taskCount">-</div>
                    <div class="stat-label">⏰ 任务数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="messageCount">-</div>
                    <div class="stat-label">💬 消息数</div>

        function confirmRestart() {
            if (confirm('确定要重启网关吗？')) {
                showToast('网关重启需要管理员权限，请使用命令行', 'warning');
            }
        }

        // ============ Toast ============
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
