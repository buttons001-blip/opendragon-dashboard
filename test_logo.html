<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Logo 测试</title>
    <style>
        .test-item { margin: 20px; padding: 10px; border: 1px solid #ccc; }
        .logo { max-width: 200px; max-height: 200px; }
    </style>
</head>
<body>
    <h1>Logo 测试页面</h1>
    <div id="results"></div>
    
    <script>
        async function test() {
            const response = await fetch('./data/cigar_inventory_v2.json?v=' + Date.now());
            const data = await response.json();
            
            const results = document.getElementById('results');
            results.innerHTML = `<p>加载成功：${data.brands.length} 个品牌，${data.inventory.length} 条记录</p>`;
            
            // 测试几个品牌的 logo
            const testBrands = ['Punch', 'Cohiba', 'Arturo Fuente OpusX', 'Warped'];
            
            for (const brand of testBrands) {
                const logo = data.brandsWithLogos[brand]?.logo;
                const div = document.createElement('div');
                div.className = 'test-item';
                
                if (logo && logo.startsWith('data:image')) {
                    div.innerHTML = `
                        <h3>${brand}</h3>
                        <p>Logo 长度：${logo.length}</p>
                        <img src="${logo}" class="logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <p style="display:none;color:red;">❌ Logo 加载失败</p>
                        <p style="display:none;color:green;">✅ Logo 加载成功</p>
                    `;
                    div.querySelector('img').onload = function() {
                        this.nextElementSibling.nextElementSibling.style.display = 'block';
                    };
                } else {
                    div.innerHTML = `<h3>${brand}</h3><p>❌ 无 Logo 数据</p>`;
                }
                
                results.appendChild(div);
            }
        }
        
        test();
    </script>
</body>
</html>
